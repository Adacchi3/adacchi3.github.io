name: Biome

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Run Biome
        run: yarn lint

  migrate:
    name: Check Biome migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Run Biome migrate
        run: yarn biome migrate --write
      - name: Check for changes
        run: |
          if ! git diff --exit-code biome.json; then
            echo "biome.json is out of date. Run 'biome migrate' and commit the result."
            exit 1
          fi
