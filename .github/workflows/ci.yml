name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRAPHQL_ENDPOINT: ${{ secrets.GRAPHQL_ENDPOINT }}
  AUTHOR_ID: ${{ secrets.AUTHOR_ID }}
  GTM_ID: ${{ secrets.GTM_ID }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build
        run: yarn build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Run Biome
        run: yarn lint

  migrate:
    name: Check Biome migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Run Biome migrate
        run: yarn biome migrate --write
      - name: Check for changes
        run: |
          if ! git diff --exit-code biome.json; then
            echo "biome.json is out of date. Run 'biome migrate' and commit the result."
            exit 1
          fi

  ci:
    name: CI
    needs: [build, lint, migrate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build.result }}" != "success" || "${{ needs.lint.result }}" != "success" || "${{ needs.migrate.result }}" != "success" ]]; then
            echo "One or more CI checks failed"
            exit 1
          fi
          echo "All CI checks passed"
